services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    depends_on:
      - db
    restart: unless-stopped
    expose:
      - "9000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_URL: ${APP_URL:-http://localhost:9090}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-cybertechna}
      DB_USERNAME: ${DB_USERNAME:-cybertechna}
      DB_PASSWORD: ${DB_PASSWORD:-cybertechna_secret}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-cybertechna_root}

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    depends_on:
      - app
    ports:
      - "9090:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cybertechna}
      MYSQL_USER: ${DB_USERNAME:-cybertechna}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cybertechna_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-cybertechna_root}
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "3307:3306"
    volumes:
      - cybertechna-db-data:/var/lib/mysql

volumes:
  cybertechna-db-data: